<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교체 혈전 - 십이귀월</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Syncopate:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ya-color: #aa00ff;
      --ran-color: #ff1744;
      --mu-color: #2962ff;
      --bg-dark: #050505;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes ashFall {
      from { background-position: 0 0; }
      to { background-position: 500px 1000px; }
    }

    /* 시네마틱 배경 이미지 */
    body {
      background: 
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
        url('img/blood_battle_bg.png') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* 트랜디한 메쉬 오버레이 */
    .mesh-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -2;
      background: 
        radial-gradient(circle at 20% 30%, rgba(170, 0, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(213, 0, 0, 0.1) 0%, transparent 40%);
      filter: blur(80px);
      animation: meshMove 20s infinite alternate linear;
      opacity: 0.5;
    }

    /* 자욱한 안개 효과 */
    .fog-overlay {
      position: fixed;
      top: 0; left: 0; width: 200%; height: 100%;
      z-index: -1;
      background: url('https://www.transparenttextures.com/patterns/fog.png');
      opacity: 0.2;
      animation: fogMove 60s infinite linear;
      pointer-events: none;
    }

    @keyframes fogMove {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    @keyframes meshMove {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.2) translate(-5%, 5%); }
    }

    .ash-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      pointer-events: none;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.15;
      animation: ashFall 120s infinite linear;
    }

    @keyframes ashFall {
      from { background-position: 0 0; }
      to { background-position: 500px 1000px; }
    }

    #particles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      filter: blur(1px);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 20px;
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 80px;
    }

    .header h1 {
      font-family: 'Syncopate', 'Noto Sans KR', sans-serif;
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: 15px;
      background: linear-gradient(180deg, #fff 0%, #ff1744 50%, #5d0000 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      text-transform: uppercase;
      filter: drop-shadow(0 0 15px rgba(255, 23, 68, 0.4));
      animation: titleGlow 4s infinite alternate;
    }

    @keyframes titleGlow {
      0% { filter: drop-shadow(0 0 10px rgba(255, 23, 68, 0.3)); }
      100% { filter: drop-shadow(0 0 25px rgba(255, 23, 68, 0.7)); }
    }

    .header p {
      font-size: 1.2rem;
      letter-spacing: 8px;
      color: rgba(255,255,255,0.4);
      font-weight: 300;
    }

    .gauge-wrapper {
      position: sticky;
      top: 20px;
      z-index: 100;
      width: 100%;
      height: 28px;
      background: rgba(255,255,255,0.05);
      border-radius: 50px;
      margin-bottom: 60px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .gauge-segment {
      height: 100%;
      position: relative;
      transition: width 1s cubic-bezier(0.19, 1, 0.22, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gauge-segment::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 200%; height: 100%;
      background: url('https://svgshare.com/i/zsH.svg') repeat-x;
      background-size: 50% 100%;
      opacity: 0.2;
      animation: wave 3s infinite linear;
    }

    @keyframes wave {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .seg-ya { background: linear-gradient(90deg, #4a0072, var(--ya-color)); }
    .seg-ran { background: linear-gradient(90deg, #880e4f, var(--ran-color)); }
    .seg-mu { background: linear-gradient(90deg, #0d47a1, var(--mu-color)); }

    .gauge-label {
      font-size: 0.75rem;
      font-weight: 900;
      color: #fff;
      z-index: 2;
      text-shadow: 0 0 5px rgba(0,0,0,0.5);
    }

    .battle-container {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 30px;
      perspective: 1500px;
    }

    .faction-card {
      flex: 1;
      min-width: 360px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 50px 30px;
      text-align: center;
      position: relative;
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
    }

    .faction-card.loaded { opacity: 1; }

    .faction-ya { --f-color: var(--ya-color); }
    .faction-ran { --f-color: var(--ran-color); }
    .faction-mu { --f-color: var(--mu-color); }

    .faction-title {
      font-family: 'Syncopate', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 40px;
      color: var(--f-color);
      text-shadow: 0 0 20px var(--f-color);
    }

    .leader-img {
      width: 200px;
      height: 200px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 35px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      transition: all 0.5s ease;
    }

    .member-list {
      list-style: none;
      width: 100%;
      margin-bottom: 40px;
      padding: 0;
    }

    .member-list li {
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 12px;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .member-list li:hover {
      background: rgba(255,255,255,0.07);
      transform: translateX(10px);
      border-left: 4px solid var(--f-color);
    }

    .member-list li img {
      width: 45px; height: 45px;
      border-radius: 50%;
      border: 2px solid var(--f-color);
    }

    .cheer-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
      color: #fff;
      font-family: 'Syncopate', 'Noto Sans KR', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.4s;
    }

    .cheer-btn:hover {
      background: var(--f-color);
      box-shadow: 0 0 30px var(--f-color);
      transform: translateY(-3px);
    }

    .vs-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syncopate', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: #ff1744;
      text-shadow: 0 0 20px #ff1744;
      padding: 0 10px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: rgba(20,20,20,0.8);
      padding: 50px;
      width: 90%;
      max-width: 900px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 40px;
      position: relative;
    }
    .modal-left { flex: 1; text-align: center; }
    .modal-right { flex: 1.5; }
    .modal-img { width: 100%; max-width: 300px; border-radius: 20px; border: 2px solid #ff1744; }
    .close { position: absolute; right: 30px; top: 20px; font-size: 40px; cursor: pointer; }
    #chartContainer { width: 100%; height: 350px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="mesh-bg"></div>
  <div class="ash-overlay"></div>
  <div class="fog-overlay"></div>
  <div id="particles"></div>

  <div class="container">
    <div class="header">
      <h1>교체 혈전</h1>
      <p>BLOOD BATTLE : FACTION WAR</p>
    </div>

    <div class="gauge-wrapper">
      <div id="barYa" class="gauge-segment seg-ya"><span class="gauge-label">YA</span></div>
      <div id="barRan" class="gauge-segment seg-ran"><span class="gauge-label">RAN</span></div>
      <div id="barMu" class="gauge-segment seg-mu"><span class="gauge-label">MU</span></div>
    </div>

    <div class="battle-container">
      <div class="faction-card faction-ya">
        <h2 class="faction-title">YA LINE</h2>
        <img src="img/yamuzi_demon.png" class="leader-img" alt="야무지">
        <ul class="member-list">
          <li onclick="openModal('야무지', 'img/yamuzi_demon.png', '혈귀술: 심연의 라벤더 전율', [95, 88, 80, 98, 85, 92])">
            <img src="img/yamuzi_demon.png" alt="">
            <span>⚔️ 야무지</span>
          </li>
          <li onclick="openModal('야라인 1', 'img/yamuzi_demon.png', '혈귀술: 어둠 베기', [70, 75, 60, 80, 65, 70])">
            <img src="img/yamuzi_demon.png" alt="">
            <span>⚔️ 야라인 1</span>
          </li>
        </ul>
        <button class="cheer-btn" onclick="cheer('ya')">피 바치기</button>
      </div>

      <div class="vs-badge">VS</div>

      <div class="faction-card faction-ran">
        <h2 class="faction-title">RAN LINE</h2>
        <img src="img/randa_demon.png" class="leader-img" alt="란다">
        <ul class="member-list">
          <li onclick="openModal('란다', 'img/randa_demon.png', '혈귀술: 금붕어 화염 폭풍', [92, 98, 85, 88, 78, 95])">
            <img src="img/randa_demon.png" alt="">
            <span>⚔️ 란다</span>
          </li>
          <li onclick="openModal('란라인 1', 'img/randa_demon.png', '혈귀술: 용암 분출', [80, 85, 70, 75, 60, 80])">
            <img src="img/randa_demon.png" alt="">
            <span>⚔️ 란라인 1</span>
          </li>
        </ul>
        <button class="cheer-btn" onclick="cheer('ran')">피 바치기</button>
      </div>

      <div class="vs-badge">VS</div>

      <div class="faction-card faction-mu">
        <h2 class="faction-title">MU LINE</h2>
        <img src="img/damu_demon.png" class="leader-img" alt="다뮤">
        <ul class="member-list">
          <li onclick="openModal('다뮤', 'img/damu_demon.png', '혈귀술: 전격 나비의 춤', [88, 85, 98, 92, 95, 90])">
            <img src="img/damu_demon.png" alt="">
            <span>⚔️ 다뮤</span>
          </li>
          <li onclick="openModal('뮤라인 1', 'img/damu_demon.png', '혈귀술: 서리 칼날', [70, 75, 85, 70, 80, 75])">
            <img src="img/damu_demon.png" alt="">
            <span>⚔️ 뮤라인 1</span>
          </li>
        </ul>
        <button class="cheer-btn" onclick="cheer('mu')">피 바치기</button>
      </div>
    </div>

    <div style="text-align: center; margin-top: 60px;">
      <a href="index.html" style="color: rgba(255,255,255,0.3); text-decoration: none; font-family: 'Syncopate'; font-size: 0.9rem; letter-spacing: 5px;">BACK TO HIDEAWAY</a>
    </div>
  </div>

  <div id="profileModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div class="modal-left">
        <img id="modalImg" src="" class="modal-img">
        <h2 id="modalName" style="font-family: 'Syncopate'; margin-top: 20px;">이름</h2>
        <p id="modalSkill" style="color: #ff1744; margin-top: 10px;">스킬</p>
      </div>
      <div class="modal-right">
        <div id="chartContainer">
          <canvas id="statChart"></canvas>
        </div>
        <p id="modalStats" style="margin-top: 20px; color: #888; text-align: center;">전적 데이터 로딩중...</p>
      </div>
    </div>
  </div>

  <script>
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      const colors = ['#ff1744', '#aa00ff', '#2962ff', '#ffffff'];
      for (let i = 0; i < 50; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 1;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = Math.random() * 100 + 'vh';
        p.style.opacity = Math.random() * 0.5 + 0.2;
        p.style.animation = `float ${Math.random() * 10 + 5}s infinite linear`;
        p.style.animationDelay = (Math.random() * 5) + 's';
        const color = colors[Math.floor(Math.random() * colors.length)];
        p.style.background = color;
        p.style.boxShadow = `0 0 10px ${color}`;
        container.appendChild(p);
      }
    }
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes float {
        0% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) translateX(10px); }
        100% { transform: translateY(0) rotate(360deg); }
      }
    `;
    document.head.appendChild(style);
    
    var myChart = null;
    createParticles();

    function openModal(name, img, skill, dataArray) {
      document.getElementById('profileModal').style.display = 'flex';
      document.getElementById('modalName').innerText = name;
      document.getElementById('modalImg').src = img;
      document.getElementById('modalSkill').innerText = skill;
      document.getElementById('modalStats').innerText = `CURRENT POWER STATUS: ${Math.floor(Math.random()*50 + 50)}%`;
      const ctx = document.getElementById('statChart').getContext('2d');
      if (myChart) myChart.destroy();
      myChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['STR', 'AGI', 'INT', 'VIT', 'DEX', 'LUK'],
          datasets: [{
            label: 'STATUS',
            data: dataArray,
            backgroundColor: 'rgba(255, 23, 68, 0.2)',
            borderColor: '#ff1744',
            pointBackgroundColor: '#ff1744',
            borderWidth: 2
          }]
        },
        options: {
          scales: {
            r: {
              angleLines: { color: 'rgba(255,255,255,0.1)' },
              grid: { color: 'rgba(255,255,255,0.1)' },
              pointLabels: { color: '#888', font: { size: 12, family: 'Syncopate' } },
              ticks: { display: false, min: 0, max: 100 }
            }
          },
          plugins: { legend: { display: false } }
        }
      });
    }

    function closeModal() { document.getElementById('profileModal').style.display = 'none'; }
    window.onclick = function(event) { if (event.target == document.getElementById('profileModal')) closeModal(); }

    let votes = { ya: 100, ran: 100, mu: 100 };
    let pendingVotes = { ya: 0, ran: 0, mu: 0 };
    let batchTimer = null;

    function updateBars() {
      const total = votes.ya + votes.ran + votes.mu + pendingVotes.ya + pendingVotes.ran + pendingVotes.mu;
      const pctYa = total === 0 ? 33.3 : ((votes.ya + pendingVotes.ya) / total * 100);
      const pctRan = total === 0 ? 33.3 : ((votes.ran + pendingVotes.ran) / total * 100);
      const pctMu = total === 0 ? 33.3 : ((votes.mu + pendingVotes.mu) / total * 100);
      document.getElementById('barYa').style.width = pctYa + '%';
      document.getElementById('barRan').style.width = pctRan + '%';
      document.getElementById('barMu').style.width = pctMu + '%';

      const updateCardEffect = (factionClass, pct) => {
        const card = document.querySelector(`.faction-${factionClass}`);
        if (!card) return;
        const diff = pct - 33.3;
        if (pct <= 20) {
          card.style.opacity = "0.3"; card.style.filter = "grayscale(1) brightness(0.5)"; card.style.transform = "scale(0.85)";
        } else if (pct <= 30) {
          card.style.opacity = "0.6"; card.style.filter = "grayscale(0.5) brightness(0.8)"; card.style.transform = "scale(0.93)";
        } else if (pct >= 45) {
          card.style.opacity = "1"; card.style.filter = "brightness(1.3) contrast(1.1)"; card.style.transform = `scale(${1 + (diff / 100)})`;
          let glowColor = factionClass === 'ya' ? 'rgba(170,0,255,0.8)' : (factionClass === 'ran' ? 'rgba(213,0,0,0.8)' : 'rgba(41,98,255,0.8)');
          card.style.boxShadow = `0 0 ${20 + (diff * 2)}px ${glowColor}, 0 20px 40px rgba(0,0,0,0.5)`;
        } else {
          card.style.opacity = "1"; card.style.filter = "none"; card.style.transform = "scale(1)";
        }
      };
      updateCardEffect('ya', pctYa); updateCardEffect('ran', pctRan); updateCardEffect('mu', pctMu);
    }

    function cheer(faction) {
      const today = new Date().toDateString();
      const lastVoteDate = localStorage.getItem('lastVoteDate');
      
      if (lastVoteDate === today) {
        alert('오늘의 피는 이미 바쳤습니다. 내일 다시 오십시오. 🌑');
        return;
      }

      document.body.style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
      setTimeout(() => { document.body.style.transform = 'translate(0,0)'; }, 50);

      pendingVotes[faction] += 1;
      updateBars();
      
      localStorage.setItem('lastVoteDate', today);
      sendVotesToServer();
    }
    
    async function sendVotesToServer() {
      if (pendingVotes.ya === 0 && pendingVotes.ran === 0 && pendingVotes.mu === 0) return;
      const p = { ...pendingVotes };
      
      votes.ya += p.ya; votes.ran += p.ran; votes.mu += p.mu;
      pendingVotes = { ya: 0, ran: 0, mu: 0 };
      updateBars();

      console.log('🔥 서버로 투표 전송 시도:', p);
      try {
        const query = `action=vote&ya=${p.ya}&ran=${p.ran}&mu=${p.mu}&sheet=BloodBattle`;
        const response = await fetch(`/.netlify/functions/gas-proxy?${query}`);
        const result = await response.json();
        
        if (result && result.totalVotes) {
          votes = result.totalVotes;
          updateBars();
          console.log('✅ 서버 업데이트 완료:', votes);
        }
      } catch (err) { 
        console.warn('전송 실패 (로컬 데이터 유지):', err.message); 
      }
    }
    
    async function fetchInitialVotes() {
      try {
        const response = await fetch('/.netlify/functions/gas-proxy?sheet=BloodBattle');
        const result = await response.json();
        const data = result.BloodBattle || result;
        if (Array.isArray(data) && data.length > 0) {
          const serverVotes = data[0];
          votes.ya = Number(serverVotes['야라인']) || 100;
          votes.ran = Number(serverVotes['란라인']) || 100;
          votes.mu = Number(serverVotes['뮤라인']) || 100;
          updateBars();
          document.querySelectorAll('.faction-card').forEach((card, idx) => {
            setTimeout(() => card.classList.add('loaded'), idx * 200);
          });
        }
      } catch (err) {
        console.warn('로드 실패:', err.message);
        document.querySelectorAll('.faction-card').forEach(card => card.classList.add('loaded'));
      }
    }
    fetchInitialVotes(); updateBars();
  </script>
</body>
</html>
