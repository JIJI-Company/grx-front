<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G-CASTLE | 🎴 보관함 (COLLECTION)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="gacha_style.css" />
    <style>
      .collection-section { padding: 140px 20px 100px; max-width: 1200px; margin: 0 auto; z-index: 10; position: relative; }
      .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; margin-top: 50px; }
      .inventory-card { background: rgba(10, 5, 8, 0.8); border: 1px solid rgba(255, 26, 74, 0.2); border-radius: 8px; overflow: hidden; transition: 0.3s; cursor: pointer; position: relative; }
      .inventory-card:hover { transform: translateY(-10px); border-color: var(--bright-red); box-shadow: 0 10px 30px rgba(255, 26, 74, 0.3); }
      .inventory-card.selected { border: 4px solid #fff !important; box-shadow: 0 0 30px #fff !important; transform: scale(1.05) translateY(-10px); }
      .inventory-card img { width: 100%; height: 200px; object-fit: cover; }
      .inventory-info { padding: 15px; text-align: center; }
      .inventory-name { font-weight: 700; font-size: 1.1rem; color: #fff; }
      .inventory-rank { font-size: 0.8rem; color: var(--bright-red); margin-bottom: 5px; }
      
      .fusion-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5, 0, 2, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border-red); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; transform: translateY(100%); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
      .fusion-bar.active { transform: translateY(0); }
      .fusion-slots { display: flex; gap: 20px; align-items: center; }
      .fusion-slot { width: 60px; height: 80px; border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 2rem; }
      .fusion-slot.filled { border: 2px solid var(--bright-red); color: var(--bright-red); }
      .btn-fusion { background: var(--bright-red); color: #fff; border: none; padding: 15px 40px; font-weight: 700; border-radius: 4px; cursor: pointer; transition: 0.3s; }
      .btn-fusion:disabled { background: #444; cursor: not-allowed; }
      .empty-msg { text-align: center; color: #555; grid-column: 1 / -1; padding: 100px 0; font-size: 1.2rem; }

      /* ── 성급별 스타일 ── */
      .inventory-card.star-2 { border: 2px solid #a0a0a0; }
      .inventory-card.star-3 { border: 2px solid #ffd700; }
      .inventory-card.star-4 { border: 2px solid #ff1a4a; }
      
      /* 💎 5성: 전설 (Legendary) */
      .inventory-card.star-5 { border: none; padding: 4px; background: linear-gradient(45deg, #ff1a4a, #ffd700, #00d4ff, #ff1a4a); background-size: 300% 300%; animation: legendary-border 4s linear infinite; box-shadow: 0 0 30px rgba(255, 26, 74, 0.6); }
      @keyframes legendary-border { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
      .inventory-card.star-5::after { content: 'LEGENDARY'; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 0 5px #ff1a4a; z-index: 10; }

      /* 🌌 6성: 신화 (MYTHIC) - 콤팩트 디자인 */
      .inventory-card.star-6 {
        border: none;
        padding: 4px;
        background: linear-gradient(45deg, #4a00e0, #8e2de2, #fff, #4a00e0);
        background-size: 300% 300%;
        animation: mythic-border-soft 6s ease infinite;
        box-shadow: 0 0 40px rgba(138, 43, 226, 0.7);
        overflow: hidden;
      }
      @keyframes mythic-border-soft {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .inventory-card.star-6::before {
        content: '';
        position: absolute; top: -150%; left: -150%; width: 400%; height: 400%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
        transform: rotate(45deg);
        animation: mythic-scan-slow 5s infinite;
        pointer-events: none;
        z-index: 5;
      }
      @keyframes mythic-scan-slow {
        0% { transform: translate(-100%, -100%) rotate(45deg); }
        100% { transform: translate(100%, 100%) rotate(45deg); }
      }
      .inventory-card.star-6::after {
        content: 'MYTHIC';
        position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
        font-size: 0.65rem; font-weight: 900; color: #fff; letter-spacing: 2px;
        text-shadow: 0 0 8px #8e2de2, 0 0 15px #fff; z-index: 10;
        opacity: 0.85;
      }
      .inventory-card.star-6 .inventory-name {
        background: linear-gradient(90deg, #fff, #8e2de2, #fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 1.1rem;
        filter: drop-shadow(0 0 3px rgba(138,43,226,0.5));
      }

      .star-container { position: absolute; top: 10px; left: 10px; display: flex; gap: 2px; z-index: 10; }
      .star-icon { color: #ffd700; font-size: 0.8rem; text-shadow: 0 0 5px rgba(0,0,0,0.8); }
      
      @keyframes shake { 0%, 100% { transform: translate(0,0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-5px,0); } 20%, 40%, 60%, 80% { transform: translate(5px,0); } }
    </style>
  </head>
  <body>
    <nav id="navbar">
      <a href="../index.html" class="logo glow-title">BACK TO CASTLE</a>
      <div class="nav-links">
        <a href="gacha.html">GACHA</a><a href="collection.html" class="active">COLLECTION</a><a href="gallery.html">GALLERY</a>
      </div>
    </nav>

    <section class="collection-section">
      <div class="gacha-header">
        <h1 class="archive-title">MY COLLECTION</h1>
        <p class="archive-subtitle">
          소환한 혈귀들을 관리하세요. 동일 카드 2장으로 더 높은 경지에 도달할 수 있습니다.<br>
          <span style="font-size: 0.85rem; color: #ff8fa0; margin-top: 10px; display: inline-block;">
            [각성 확률] 2성: 95% | 3성: 65% | 4성: 45% | 5성: 30% | 6성: 20% (실패 시 재료 카드 소멸)
          </span>
        </p>
        <div class="sort-controls" style="margin-top: 30px; display: flex; justify-content: center; gap: 15px;">
          <button id="btnSortStar" class="btn-secondary-gacha" style="margin-top: 0; background: rgba(255, 26, 74, 0.2); color: #fff; border-color: #ff1a4a;">⭐ 전체 보기</button>
          <select id="memberFilter" class="btn-secondary-gacha" style="margin-top: 0; background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border: 1px solid #333; border-radius: 4px;">
            <option value="">👤 멤버별 보기</option>
          </select>
        </div>
      </div>
      <div id="collectionGrid" class="collection-grid"></div>
    </section>

    <div id="fusionBar" class="fusion-bar">
      <div class="fusion-slots">
        <div id="slot1" class="fusion-slot">+</div>
        <div style="color:var(--bright-red); font-weight:800;">FUSION</div>
        <div id="slot2" class="fusion-slot">+</div>
      </div>
      <div id="fusionTargetInfo" style="color:#aaa; font-size:0.9rem;">동일한 카드 2장을 선택하세요.</div>
      <div style="display: flex; gap: 10px;">
        <button id="btnDeselect" class="btn-fusion" style="background:#555;" disabled>선택 취소</button>
        <button id="btnFusion" class="btn-fusion" disabled>혈귀 각성 수행</button>
      </div>
    </div>
    <div class="particle-system" id="particles"></div>
    <script src="collection_script.js"></script>
  </body>
</html>
