<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G-CASTLE | 🎨 팬 아트 & 갤러리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;700;800&display=swap"
      rel="stylesheet"
    />
    <meta name="referrer" content="no-referrer" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ── 배경 레이어 ── -->
    <div class="bg-base"></div>
    <div class="bg-ash"></div>

    <!-- ── G-CASTLE 글로벌 네비게이션 ── -->
    <nav id="navbar">
      <a href="../index.html" class="logo glow-title">BACK TO CASTLE</a>
      <div class="nav-links">
        <a href="gacha.html">GACHA</a><a href="collection.html">COLLECTION</a><a href="gallery.html" class="active">GALLERY</a>
      </div>
      <button id="adminGalleryBtn" style="background:none; border:1px solid rgba(255,26,74,0.3); color:#444; font-size:0.6rem; padding:2px 5px; cursor:pointer;" onclick="toggleAdminModal()">ADMIN</button>
    </nav>

    <!-- ── 갤러리 영역 (Masonry 레이아웃) ── -->
    <section class="gallery-section">
      <div class="gallery-header">
        <h1 class="glow-title">ART ARCHIVE</h1>
        <p>크루원들을 위해 헌정된 소중한 팬 아트 스탠드</p>
      </div>

      <!-- 📌 관리자용 작품 등록 모달 -->
      <div id="adminModal" class="admin-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:400px; background:rgba(10,0,5,0.95); border:1px solid #ff1a4a; padding:30px; z-index:9999; border-radius:10px; backdrop-filter:blur(10px);">
        <h3 style="color:#ff1a4a; margin-bottom:20px;">🖼️ 새 작품 등록</h3>
        <form id="adminGalleryForm" style="display:flex; flex-direction:column; gap:15px;">
          <input type="text" id="artUrl" placeholder="이미지 주소 (URL) 필수" required style="background:#000; border:1px solid #444; color:#fff; padding:10px;">
          <input type="text" id="artAuthor" placeholder="작가명 (기본: G-CASTLE)" style="background:#000; border:1px solid #444; color:#fff; padding:10px;">
          <textarea id="artDesc" placeholder="작품 설명" style="background:#000; border:1px solid #444; color:#fff; padding:10px; resize:none;"></textarea>
          <input type="text" id="artLink" placeholder="원본 링크 (선택)" style="background:#000; border:1px solid #444; color:#fff; padding:10px;">
          <div style="display:flex; gap:10px;">
            <button type="submit" style="flex:1; background:#ff1a4a; color:#fff; border:none; padding:10px; font-weight:700; cursor:pointer;">등록 수행</button>
            <button type="button" onclick="toggleAdminModal()" style="flex:1; background:#333; color:#fff; border:none; padding:10px; cursor:pointer;">취소</button>
          </div>
        </form>
      </div>

      <!-- 📌 라이트박스 (클릭 시 이미지 팝업) -->
      <div id="galleryLightbox" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(2,0,5,0.95); z-index:10000; flex-direction:column; align-items:center; justify-content:center; opacity:0; transition:opacity 0.3s;">
        <span onclick="closeLightbox()" style="position:absolute; top:30px; right:40px; color:#fff; font-size:2rem; cursor:pointer; text-shadow:0 0 10px #ff1a4a;">&times;</span>
        <img id="lightboxImg" src="" style="max-width:90%; max-height:80vh; border:2px solid #ff1a4a; box-shadow:0 0 40px rgba(255,26,74,0.4); border-radius:4px; transform:scale(0.9); transition:transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <div id="lightboxDesc" style="color:#fff; margin-top:20px; font-size:1.1rem; text-align:center;"></div>
        <div id="lightboxAuthor" style="color:var(--bright-red); font-weight:700; font-size:0.9rem; margin-top:5px;"></div>
      </div>

      <!-- 핀터레스트 스타일 다단 칼럼 (Column) 로드 -->
      <div class="gallery-masonry" id="galleryMasonry">
        <!-- JS로 채워짐 -->
      </div>
    </section>

    <div class="particle-system" id="particles"></div>

    <script src="../common/config.js"></script>
    <script src="../common/dataService.js"></script>
    <script src="script.js"></script>
  </body>
</html>
