<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GGU-CASTLE : INFINITE SCHEDULE</title>
    <!-- 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../GGU/style.css" />
    <style>
      /* 스케줄 전용 커스텀 스타일 */
      .schedule-hero {
        padding: 120px 5% 50px;
        text-align: center;
        position: relative;
        z-index: 10;
        border-bottom: 1px solid rgba(255, 26, 74, 0.2);
        background: linear-gradient(to bottom, rgba(5,0,2,0.9), transparent);
      }
      .sch-title-main {
        font-family: 'Oswald', sans-serif;
        font-size: 4rem;
        color: #fff;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .sch-title-sub {
        color: var(--bright-red);
        font-size: 1.1rem;
        letter-spacing: 0.15rem;
        margin-top: 10px;
      }

      .schedule-container {
        max-width: 1400px;
        margin: 50px auto 100px;
        padding: 0 5%;
        position: relative;
        z-index: 10;
      }
      .schedule-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }
      .sch-tabs button {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: #aaa;
        padding: 10px 20px;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.3s;
        margin-right: 10px;
        font-weight: 600;
      }
      .sch-tabs button.active, .sch-tabs button:hover {
        background: rgba(255, 26, 74, 0.2);
        border-color: var(--bright-red);
        color: #fff;
      }
      
      .sch-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 30px;
      }
      
      /* V-Company Style Schedule Card */
      .sch-card {
        background: linear-gradient(135deg, rgba(8, 0, 2, 0.95), rgba(15, 0, 5, 0.85));
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-top: 1px solid rgba(255, 26, 74, 0.3);
        border-radius: 16px;
        overflow: hidden;
        transition: all 0.4s ease;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        cursor: pointer;
      }
      .sch-card:hover {
        transform: translateY(-8px);
        border-color: rgba(255, 26, 74, 0.8);
        box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255, 26, 74, 0.2);
      }
    </style>
  </head>
  <body class="bg-castle">
    <!-- 배경 이펙트 (공통) -->
    <div class="blood-particles" id="particles"></div>

    <div class="layout-wrapper">
        <nav id="navbar">
      <a href="../index.html" class="logo glow-title">G-CASTLE</a>
      <div class="nav-links">
        <a href="../lve/live.html">LIVE</a><a href="../GGCard/card.html">MEMBERS</a><a href="../GRX/history.html">HISTORY</a><a href="times.html">TIMES</a><a href="schedule.html" class="active">SCHEDULE</a>
      </div>
    </nav>

      <section class="schedule-hero">
        <h1 class="sch-title-main">INFINITE SCHEDULE</h1>
        <p class="sch-title-sub">무한성의 모든 작전 일정을 확인하세요</p>
      </section>

      <main class="schedule-container">
        <div class="schedule-actions">
          <div class="sch-tabs">
            <button class="active">전체 보기</button>
            <button>합방</button>
            <button>개인방송</button>
            <button>이벤트</button>
          </div>
        </div>

        <div class="sch-grid" id="fullScheduleGrid">
          <!-- JS로 동적 로드 (안정적인 레이아웃 테스트용 더미 삽입) -->
        </div>
      </main>

      <footer>
        <div class="footer-logo">G-CASTLE</div>
        <p>© 2026 GGU-CASTLE. CREATED BY ㅇㅇ.</p>
      </footer>
    </div>

    <!-- 공통 동작 -->
    <script src="../common/config.js"></script>
    <script src="../common/dataService.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // 입자 렌더링
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
          let span = document.createElement('span');
          span.style.left = Math.random() * 100 + '%';
          span.style.top = Math.random() * 100 + '%';
          span.style.animationDuration = (Math.random() * 10 + 5) + 's';
          span.style.animationDelay = (Math.random() * 5) + 's';
          pContainer.appendChild(span);
        }

        // [SOOP 연동] GAS URL을 여기에 입력하세요.
        // [공식 API 지원 대기] 현재는 안정성을 위해 견본 데이터를 출력합니다.
        const grid = document.getElementById('fullScheduleGrid');
        
        function renderMockData() {
          const mockData = [
            { title: "무한성 건축 대작전 (Season 2)", desc: "마인크래프트 GGU 서버 건축 노가다 및 힐링 소통", img: "../img/ggu_title.jpg", member: "꾸티뉴", avatar: "../img/ggutinho.png", time: "내일 20:00" },
            { title: "상현 집결 긴급 회의", desc: "전 멤버가 모여 하반기 프로젝트 방향성을 논의합니다.", img: "../img/ggu_title.jpg", member: "난워니", avatar: "../img/nanana.png", time: "금주 금요일" },
            { title: "혈귀술 집중 훈련", desc: "Just Chatting - 야무지의 심야 심리 상담소 오픈", img: "", member: "야무지", avatar: "../img/yamuzi.png", time: "금주 주말" },
            { title: "합방 게릴라 습격", desc: "예고 없는 합방, 누가누가 당할 것인가?", img: "", member: "엔쥬", avatar: "../img/enju.png", time: "미정" },
            { title: "Coming Soon...", desc: "공식 일정 동기화 기능이 준비 중입니다.", img: "", member: "GGU-CASTLE", avatar: "../img/ggu_title.jpg", time: "SOOP API 대기 중" }
          ];

          grid.innerHTML = mockData.map(data => `
            <div class="sch-card">
              <div class="vc-thumbnail">
                <img src="${data.img || '../img/ggu_title.jpg'}" alt="Thumbnail">
              </div>
              <div class="vc-content">
                <h3 class="vc-title">${data.title}</h3>
                <p class="vc-desc">${data.desc}</p>
              </div>
              <div class="vc-footer">
                <img src="${data.avatar}" class="vc-avatar" alt="${data.member}">
                <div class="vc-meta">
                  <span class="vc-author">${data.member}</span>
                  <span class="vc-time">${data.time}</span>
                </div>
              </div>
            </div>
          `).join('');
        }

        // 견본 데이터 로드
        renderMockData();
      });
    </script>
  </body>
</html>
