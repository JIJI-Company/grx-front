<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRX | TEAM HISTORY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Noto+Sans+KR:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 배경 레이어 -->
    <div class="bg-base"></div>
    <div class="bg-particles"></div>
    <div class="bg-scanline"></div>
    <div class="bg-vignette"></div>
    <div class="flame flame-left"></div>
    <div class="flame flame-right"></div>

    <!-- NAV -->
    <nav id="mainNav">
      <a href="../GGU/index.html" class="logo">G-CASTLE</a>
      <div class="nav-links">
        <a href="#">LIVE</a>
        <a href="../GGCard/card.html">MEMBERS</a>
        <a href="history.html" class="active">HISTORY</a>
      </div>
    </nav>

    <!-- ── 히어로 ── -->
    <section class="hof-hero">
      <div class="hero-glow"></div>
      <span class="hof-label">RECORD OF GLORY</span>
      <h1 class="hero-title">GRX<span class="bar">|</span>HISTORY</h1>
      <p class="hero-sub">꾸한성 크루의 영광스러운 기록들</p>
      <div class="hero-scroll-hint">
        <span></span>
      </div>
    </section>

    <!-- ── 명예의 전당 ── -->
    <section class="hof-section">
      <div class="section-header">
        <div class="section-line"></div>
        <h2 class="section-title">🏆 HALL OF FAME</h2>
        <div class="section-line"></div>
      </div>
      <p class="section-desc">대회 수상 기록 전체 하이라이트</p>

      <!-- 전체 통계 -->
      <div class="total-stats" id="totalStats"></div>

      <!-- 전체 카드 슬라이더 -->
      <div class="slider-outer">
        <button
          class="slide-arrow arrow-left"
          onclick="slideCards('hof-slider', -1)"
        >
          ❮
        </button>
        <div class="cards-track" id="hof-slider"></div>
        <button
          class="slide-arrow arrow-right"
          onclick="slideCards('hof-slider', 1)"
        >
          ❯
        </button>
      </div>
    </section>

    <!-- ── 카테고리별 기록 ── -->
    <section class="cat-section">
      <div class="section-header">
        <div class="section-line"></div>
        <h2 class="section-title">📋 BY CATEGORY</h2>
        <div class="section-line"></div>
      </div>
      <p class="section-desc">게임 카테고리별 수상 기록</p>

      <!-- 탭 -->
      <div class="category-tabs">
        <button class="tab-btn active" data-cat="all">🏆 ALL</button>
        <button class="tab-btn" data-cat="lol">⚔️ LOL</button>
        <button class="tab-btn" data-cat="battleground">🪖 배그</button>
        <button class="tab-btn" data-cat="vr">🥽 VR</button>
        <button class="tab-btn" data-cat="minecraft">⛏️ MINECRAFT</button>
        <button class="tab-btn" data-cat="multi">🎮 MULTI</button>
      </div>

      <!-- 카테고리 통계 뱃지 -->
      <div class="cat-stats" id="catStats"></div>

      <!-- 카테고리 카드 -->
      <div class="slider-outer">
        <button
          class="slide-arrow arrow-left"
          onclick="slideCards('cat-slider', -1)"
        >
          ❮
        </button>
        <div class="cards-track" id="cat-slider"></div>
        <button
          class="slide-arrow arrow-right"
          onclick="slideCards('cat-slider', 1)"
        >
          ❯
        </button>
      </div>
    </section>

    <footer>
      <span class="footer-logo">GRX</span>
      <p>© 2025 GRX GAMING. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
