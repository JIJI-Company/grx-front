<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 거래소 점검 중 | G-CASTLE EXCHANGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff1744;
            --text: #ffffff;
        }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            text-align: center;
        }
        /* 배경 이펙트 */
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255, 23, 68, 0.15) 0%, transparent 70%);
            filter: blur(80px); z-index: -1;
            animation: pulse 4s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.5; transform: scale(1); } to { opacity: 1; transform: scale(1.2); } }

        .content { padding: 40px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); }
        .icon { font-size: 4rem; margin-bottom: 20px; display: block; animation: rotate 10s infinite linear; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        h1 { font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 10px; color: var(--accent); text-shadow: 0 0 20px rgba(255, 23, 68, 0.5); }
        p { color: #888; font-size: 1.1rem; line-height: 1.6; }
        .btn-home {
            display: inline-block; margin-top: 30px; padding: 12px 30px;
            background: transparent; border: 1px solid var(--accent);
            color: var(--accent); text-decoration: none; border-radius: 50px;
            font-weight: 700; transition: all 0.3s;
        }
        .btn-home:hover { background: var(--accent); color: #fff; box-shadow: 0 0 30px var(--accent); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="content">
        <span class="icon">⚙️</span>
        <h1>SYSTEM UNDER MAINTENANCE</h1>
        <p>현재 주식 거래소 시스템 안정화 작업 중입니다.<br>더 정확하고 쾌적한 거래 환경을 위해 잠시만 기다려 주세요.</p>
        <a href="/index.html" class="btn-home">G-CASTLE 메인으로 돌아가기</a>
    </div>
</body>
</html>
