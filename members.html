<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GGU-CASTLE | MEMBERS</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="GGCard/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
  </head>
  <body class="members-page">
    <div id="cursor-glow"></div>
        <nav id="navbar">
      <a href="index.html" class="logo glow-title">G-CASTLE</a>
      <div class="nav-links">
        <a href="live.html">LIVE</a><a href="members.html" class="active">MEMBERS</a><a href="history.html">HISTORY</a><a href="times.html">TIMES</a><a href="schedule.html">SCHEDULE</a>
      </div>
    </nav>

    <div id="main-app">
      <div class="bg-castle"><div class="blood-particles"></div></div>

      <section class="container animate-fade-in">
        <!-- 📜 전통 도감식 그리드 뷰 -->
        <div id="traditional-grids-view">
          <h2 class="rank-title">THE MASTER</h2>
          <div class="master-container">
            <div class="flip-container member-card" data-id="gguu"></div>
          </div>

          <h2 class="rank-title">상현</h2>
          <div class="members-grid" id="upper-grid"></div>

          <h2 class="rank-title">하현</h2>
          <div class="members-grid" id="lower-grid"></div>

          <h2 class="rank-title">NEW</h2>
          <div class="members-grid" id="new-grid"></div>
        </div>

        <!-- 🌌 3D 공간 폭발 캔버스 영역 -->
        <div id="mindmap-canvas-container" style="display: none;">
          <div class="mindmap-instruction" id="space-instruction">
            <span class="pulse-dot"></span> 마스터를 클릭하여 무한성 공간을 전개하세요
          </div>
          <div id="mindmap-canvas" style="perspective: 1500px; transform-style: preserve-3d;">
            <div id="mindmap-nodes-layer" style="transform-style: preserve-3d;"></div>
          </div>
        </div>
      </section>
    </div>

    <div id="memberModal" class="modal-overlay">
      <div class="modal-content">
        <span class="close-btn" onclick="closeMemberModal()">&times;</span>
        <div id="modal-detail-view"></div>
      </div>
    </div>

    <footer><p>2026 GGU-CASTLE. CREATED BY ㅇㅇ.</p></footer>

    <script src="GGCard/script.js"></script>
  </body>
</html>
