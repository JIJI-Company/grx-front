<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GGU-CASTLE : INFINITE SCHEDULE</title>
    <!-- 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <style>
      /* 스케줄 전용 커스텀 스타일 */
      .schedule-hero {
        padding: 120px 5% 50px;
        text-align: center;
        position: relative;
        z-index: 10;
        border-bottom: 1px solid rgba(255, 26, 74, 0.2);
        background: linear-gradient(to bottom, rgba(5,0,2,0.9), transparent);
      }
      
      /* 👑 멤버별 공지 그룹 커스텀 스타일 */
      .member-schedule-group {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-bottom: 20px;
      }
      .member-sch-header {
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 1px solid rgba(255, 26, 74, 0.3);
        padding-bottom: 12px;
        margin-bottom: 10px;
      }
      .member-sch-header img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--bright-red);
        background: #000;
      }
      .member-sch-header h2 {
        color: #fff;
        font-size: 1.5rem;
        margin: 0;
        font-family: 'Noto Sans KR', sans-serif;
      }
      .member-sch-header h2 span {
        color: #888;
        font-size: 0.9rem;
        font-weight: 300;
        margin-left: 10px;
      }

      .sch-title-main {
        font-family: 'Oswald', sans-serif;
        font-size: 4rem;
        color: #fff;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .sch-title-sub {
        color: var(--bright-red);
        font-size: 1.1rem;
        letter-spacing: 0.15rem;
        margin-top: 10px;
      }

      .schedule-container {
        max-width: 1400px;
        margin: 50px auto 100px;
        padding: 0 5%;
        position: relative;
        z-index: 10;
      }
      .schedule-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }
      .sch-tabs {
        display: flex;
        flex-wrap: wrap; /* 2줄 이상으로 감싸기 */
        justify-content: center;
        gap: 10px;
        max-width: 1000px;
        margin: 0 auto;
      }
      .sch-tabs::-webkit-scrollbar { display: none; }
      
      .sch-tabs button {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: #aaa;
        padding: 10px 20px;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: 600;
        white-space: nowrap;
      }
      .sch-tabs button.active, .sch-tabs button:hover {
        background: rgba(255, 26, 74, 0.2);
        border-color: var(--bright-red);
        color: #fff;
      }
      
      .sch-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 30px;
      }
      
      /* V-Company Style Schedule Card */
      .sch-card {
        background: linear-gradient(135deg, rgba(8, 0, 2, 0.95), rgba(15, 0, 5, 0.85));
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-top: 1px solid rgba(255, 26, 74, 0.3);
        border-radius: 16px;
        overflow: hidden;
        transition: all 0.4s ease;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        cursor: pointer;
      }
      .sch-card:hover {
        transform: translateY(-8px);
        border-color: rgba(255, 26, 74, 0.8);
        box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255, 26, 74, 0.2);
      }
      
      /* 🖼️ 썸네일 없을 때의 커스텀 스타일 (제목 강조형) */
      .sch-card.no-thumbnail {
        height: 220px; /* 고정 높이 */
        display: flex;
        flex-direction: column;
      }
      .sch-card.no-thumbnail .vc-content {
        flex: 1;
        padding: 30px 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(255, 26, 74, 0.15), transparent);
        text-align: center;
      }
      .sch-card.no-thumbnail .vc-title {
        font-size: 1.4rem; /* 적절한 크기로 조정 */
        line-height: 1.5;
        max-height: 4.5em; /* 최대 3줄 높이 */
        -webkit-line-clamp: 3; /* 최대 3줄까지만 노출 */
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        word-break: keep-all; /* 한글 단어 단위 끊기 */
        color: #fff;
        text-shadow: 0 0 15px rgba(255, 26, 74, 0.4);
      }
      
      /* 일반 제목 스타일 보강 */
      .vc-title {
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 700;
        margin: 0;
        color: #fff;
      }

      .vc-content {
        padding: 15px 20px;
        background: rgba(0,0,0,0.2);
      }

      @media (max-width: 768px) {
        .sch-title-main { font-size: 2.5rem; }
        .sch-title-sub { font-size: 0.9rem; }
        .schedule-actions { flex-direction: column; align-items: flex-start; }
        .sch-grid { grid-template-columns: 1fr; }
        .schedule-hero { padding-top: 140px; }
      }
      @media (max-width: 480px) {
        .sch-title-main { font-size: 2rem; }
        .schedule-container { margin-bottom: 60px; }
      }

      /* 애니메이션 효과 강제 정의 (카드 나타나기) */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        opacity: 0;
        animation: fadeIn 0.8s ease-out forwards !important;
      }
    </style>
  </head>
  <body class="show-main">
    <!-- 배경 이펙트 (공통) -->
    <div class="bg-castle">
      <div class="blood-particles" id="particles"></div>
    </div>

    <div class="layout-wrapper">
        <nav id="navbar">
      <a href="index.html" class="logo glow-title">G-CASTLE</a>
      <div class="nav-links">
        <a href="live.html">LIVE</a><a href="members.html">MEMBERS</a><a href="history.html">HISTORY</a><a href="times.html">TIMES</a><a href="schedule.html" class="active">SCHEDULE</a><!-- <a href="calendar.html">CALENDAR</a> -->
      </div>
    </nav>

      <section class="schedule-hero">
        <h1 class="sch-title-main">INFINITE SCHEDULE</h1>
        <p class="sch-title-sub">무한성의 모든 작전 일정을 확인하세요</p>
      </section>


      <main class="schedule-container">
        <div class="schedule-actions">
          <div class="sch-tabs" id="memberTabs">
            <button class="active">전체 보기</button>
            <!-- 탭 (JS 동적 렌더링) -->
          </div>
        </div>

        <div class="sch-grid" id="fullScheduleGrid">
          <!-- JS로 동적 로드 (안정적인 레이아웃 테스트용 더미 삽입) -->
        </div>
      </main>

      <footer>
        <div class="footer-logo">G-CASTLE</div>
        <p>© 2026 GGU-CASTLE. CREATED BY ㅇㅇ.</p>
      </footer>
    </div>

    <!-- 공통 동작 -->
    <script src="common/config.js"></script>
    <script src="common/dataService.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        // 공통 프리미엄 인터랙션 구동
        if (typeof initCommonInteractions === 'function') initCommonInteractions();

        // 입자 렌더링
        const pContainer = document.getElementById('particles');
        if (pContainer) {
          for (let i = 0; i < 40; i++) {
            let span = document.createElement('span');
            span.style.left = Math.random() * 100 + '%';
            span.style.top = Math.random() * 100 + '%';
            span.style.animationDuration = (Math.random() * 10 + 5) + 's';
            span.style.animationDelay = (Math.random() * 5) + 's';
            pContainer.appendChild(span);
          }
        }

        // [일정표 그리드] 실데이터 로드 및 멤버별 그룹핑 함수
        const grid = document.getElementById('fullScheduleGrid');
        
        async function loadRealSchedules() {
          if (!grid) return;
          grid.innerHTML = '<p style="color:#aaa; text-align:center; width:100%; padding:50px;">무한성 통신망을 통해 전 멤버의 기록을 불러오는 중...</p>';
          
          try {
            // 📡 1. 전체 멤버 리스트와 일정을 동시에 가져옵니다.
            const [liveResponse, schResponse] = await Promise.all([
              DataService.getLive(),
              DataService.getSchedules()
            ]);

            // 💡 [수정] 이름이나 ID가 없는 유령 멤버는 필터링하여 제외합니다.
            let allMembers = (Array.isArray(liveResponse) ? liveResponse : (liveResponse?.Live || []))
                               .filter(m => (m.name && String(m.name).trim()) || (m.id && String(m.id).trim()));
            
            // 나간 멤버(구본좌 등)를 시트 데이터와 무관하게 화면에서 강제 제외 처리
            const excludedMembers = ["구본좌"];
            allMembers = allMembers.filter(m => !excludedMembers.includes(m.name) && !excludedMembers.includes(m.id));
            
            // 신규 멤버 등 Live 시트에 없을 수 있는 멤버 강제 추가
            const extraMembers = [
              { name: "서라0", profileImg: "img/서라0.jpg" },
              { name: "임민트", profileImg: "img/mint.png" }
            ];
            extraMembers.forEach(extra => {
              if (!allMembers.find(m => m.name === extra.name || m.id === extra.name)) {
                allMembers.push(extra);
              }
            });
            
            const rawSchedules = (schResponse && schResponse.Schedule) ? schResponse.Schedule : (Array.isArray(schResponse) ? schResponse : []);
            
            // 스케줄에는 있지만 allMembers에 없는 멤버도 추가 (예외 처리)
            rawSchedules.forEach(s => {
               const mName = s.Member || s.member;
               if(mName && !excludedMembers.includes(mName) && !allMembers.find(m => (m.name === mName || m.id === mName))) {
                   allMembers.push({ name: mName, profileImg: `img/${mName}.png` });
               }
            });

            if (!allMembers || allMembers.length === 0) {
                grid.innerHTML = '<p style="color:#ff1a4a; text-align:center; width:100%; padding:50px;">멤버 정보를 불러오지 못했습니다. Live 시트를 확인하세요.</p>';
                return;
            }

            // 👑 2. 기존 그리드 속성 해제 및 스택 컨테이너 설정
            grid.innerHTML = "";
            grid.classList.remove('sch-grid');
            grid.style.display = 'flex';
            grid.style.flexDirection = 'column';
            grid.style.gap = '50px';

            // 👑 3. 모든 멤버에 대해 루프를 돌며 섹션 생성
            const blocksHtml = allMembers.map(member => {
              const memberName = member.name || member.id;
              const memberAvatar = member.profileImg || member.avatar || "img/ggu_title.jpg";
              
              // 해당 멤버의 일정만 필터링
              const mySchedules = rawSchedules.filter(s => s.Member === memberName || s.member === memberName);
              
              let cardsHtml = "";
              if (mySchedules.length > 0) {
                cardsHtml = mySchedules.map(data => {
                  const postLink = data.Link || data.link || "#";
                  const hasRealThumb = data.Thumbnail && !data.Thumbnail.includes('ggu_title.jpg');
                  const cardClass = hasRealThumb ? 'sch-card animate-fade-in' : 'sch-card animate-fade-in no-thumbnail';

                  return `
                  <div class="${cardClass}" onclick="window.open('${postLink}', '_blank')">
                    ${hasRealThumb ? `
                    <div class="vc-thumbnail">
                      <img src="${data.Thumbnail}" alt="Thumbnail">
                    </div>` : ''}
                    <div class="vc-content">
                      <h3 class="vc-title">${data.Title || data.title || ""}</h3>
                    </div>
                    <div class="vc-footer">
                      <div class="vc-meta" style="flex-direction:row; align-items:center; gap:8px;">
                        <span class="vc-author" style="color:var(--bright-red); font-weight:bold;">새 소식 📡</span>
                        <span class="vc-time">${data.Time || data.time}</span>
                      </div>
                    </div>
                    <div class="vc-click-overlay">해당 글 확인하기 →</div>
                  </div>
                  `;
                }).join('');
              }

              return `
                <div class="member-schedule-group animate-fade-in" data-member="${memberName}">
                  <div class="member-sch-header">
                    <img src="${memberAvatar}" alt="${memberName}" onerror="this.src='img/ggu_title.jpg'">
                    <h2>${memberName}<span>님의 최근 공지사항</span></h2>
                  </div>
                  <div class="sch-grid">
                    ${cardsHtml}
                  </div>
                </div>
              `;
            }).join('');

            grid.innerHTML = blocksHtml;

            // 👑 4. 멤버 탭 업데이트 (전체 멤버 기준)
            const tabsContainer = document.getElementById('memberTabs');
            if (tabsContainer) {
              const memberNames = allMembers.map(m => m.name || m.id);
              tabsContainer.innerHTML = `<button class="active" onclick="filterMember('ALL', this)">전체 보기</button>` + 
                memberNames.map(name => `<button onclick="filterMember('${name}', this)">${name}</button>`).join('');
            }

          } catch (err) {
            console.error("Schedule load error:", err);
            grid.innerHTML = '<p style="color:#ff1a4a; text-align:center; width:100%; padding:50px;">데이터 통신 중 오류가 발생했습니다.</p>';
          }
        }

        // 👑 필터링 기능 (전역 함수로 추가)
        // 👑 필터링 기능 (GSAP FLIP 기반 프리미엄 그리드 리플로우)
        window.filterMember = function(member, btn) {
          document.querySelectorAll('#memberTabs button').forEach(b => b.classList.remove('active'));
          if (btn) btn.classList.add('active');
          
          const groups = document.querySelectorAll('.member-schedule-group');
          
          // 1. FIRST: 기존 모든 그룹의 현재 스크롤 대비 실제 화면 좌표(Rect) 캐싱
          const firstStates = [];
          groups.forEach(group => {
            const rect = group.getBoundingClientRect();
            firstStates.push({
              el: group,
              top: rect.top,
              left: rect.left,
              opacity: parseFloat(window.getComputedStyle(group).opacity) || 1,
              display: window.getComputedStyle(group).display
            });
          });

          // 2. 필터링 변경 (레이아웃 좌표 변화 유발)
          groups.forEach(group => {
            if (member === 'ALL' || group.getAttribute('data-member') === member) {
              group.style.display = 'flex';
            } else {
              group.style.display = 'none';
            }
          });

          // 3. LAST & INVERT & PLAY: 바뀐 레이아웃 좌표를 기반으로 부드러운 위치/스케일 보정 애니메이션 수행
          firstStates.forEach(state => {
            const group = state.el;
            const wasVisible = state.display !== 'none';
            const isVisible = (member === 'ALL' || group.getAttribute('data-member') === member);

            if (wasVisible && !isVisible) {
              // 사라지는 카드: 제자리에서 스케일다운 & 페이드아웃 후 디스플레이 해제
              group.style.display = 'flex'; // 애니메이션 동안 보이도록 차단
              gsap.to(group, {
                scale: 0.85,
                opacity: 0,
                duration: 0.35,
                ease: "power2.inOut",
                onComplete: () => {
                  group.style.display = 'none';
                }
              });
            } else if (!wasVisible && isVisible) {
              // 나타나는 카드: 작고 어두운 상태에서 통통 튀며 스케일업 등장
              gsap.killTweensOf(group);
              gsap.fromTo(group, 
                { scale: 0.85, opacity: 0, y: 30 },
                { scale: 1, opacity: 1, y: 0, duration: 0.5, ease: "back.out(1.3)" }
              );
            } else if (wasVisible && isVisible) {
              // 상시 노출 카드: 레이아웃 시프트에 따라 발생한 Delta 간격을 GSAP 관성 좌표로 메꾸며 부드럽게 미끄러짐
              gsap.killTweensOf(group);
              const lastRect = group.getBoundingClientRect();
              const deltaY = state.top - lastRect.top;

              if (deltaY !== 0) {
                gsap.fromTo(group,
                  { y: deltaY, scale: 1, opacity: 1 },
                  { y: 0, duration: 0.6, ease: "power3.out" }
                );
              } else {
                gsap.to(group, { scale: 1, opacity: 1, duration: 0.3 });
              }
            }
          });
        };

        // 초기 실행
        loadRealSchedules();
      });

      // =========================================
      // 🪐 [프리미엄 GSAP 공통 인터랙션 패키지]
      // =========================================
      function initSmoothScroll() {
        if (typeof Lenis !== 'undefined') {
          const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smooth: true
          });
          lenis.on('scroll', ScrollTrigger.update);
          gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
          });
          gsap.ticker.lagSmoothing(0);
        }
      }

      class TextScramble {
        constructor(el) {
          this.el = el;
          this.chars = '!<>-_\\/[]{}—=+*^?#________';
          this.update = this.update.bind(this);
        }
        setText(newText) {
          const oldText = this.el.innerText;
          const length = Math.max(oldText.length, newText.length);
          const promise = new Promise((resolve) => this.resolve = resolve);
          this.queue = [];
          for (let i = 0; i < length; i++) {
            const from = oldText[i] || '';
            const to = newText[i] || '';
            const start = Math.floor(Math.random() * 15);
            const end = start + Math.floor(Math.random() * 15);
            this.queue.push({ from, to, start, end });
          }
          cancelAnimationFrame(this.frameRequest);
          this.frame = 0;
          this.update();
          return promise;
        }
        update() {
          let output = '';
          let complete = 0;
          for (let i = 0, n = this.queue.length; i < n; i++) {
            let { from, to, start, end, char } = this.queue[i];
            if (this.frame >= end) {
              complete++;
              output += to;
            } else if (this.frame >= start) {
              if (!char || Math.random() < 0.28) {
                char = this.randomChar();
                this.queue[i].char = char;
              }
              output += `<span style="color: #e11d48; opacity: 0.7;">${char}</span>`;
            } else {
              output += from;
            }
          }
          this.el.innerHTML = output;
          if (complete === this.queue.length) {
            this.resolve();
          } else {
            this.frameRequest = requestAnimationFrame(this.update);
            this.frame++;
          }
        }
        randomChar() {
          return this.chars[Math.floor(Math.random() * this.chars.length)];
        }
      }

      function initCommonInteractions() {
        initSmoothScroll();

        // 메뉴 호버 스크램블
        document.querySelectorAll('.nav-links a').forEach(link => {
          const originalText = link.innerText;
          const fx = new TextScramble(link);
          let isScrambling = false;
          
          link.addEventListener('mouseenter', () => {
            if (isScrambling) return;
            isScrambling = true;
            fx.setText(originalText).then(() => {
              isScrambling = false;
            });
          });
        });

        // 헤더 타이틀 디코딩 등장 연출
        const glowTitle = document.querySelector('.glow-title, .hero-title, .archive-title, .sch-title-main');
        if (glowTitle) {
          const orig = glowTitle.innerText;
          const fx = new TextScramble(glowTitle);
          gsap.set(glowTitle, { opacity: 1 });
          setTimeout(() => {
            fx.setText(orig);
          }, 400);
        }
      }
    </script>
  </body>
