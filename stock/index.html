<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>꾸한성 주식 거래소 | G-CASTLE EXCHANGE</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0b1e;
      --card-bg: rgba(255, 255, 255, 0.05);
      --accent: #bb86fc;
      --up: #ff4d4d;
      --down: #4d79ff;
      --text: #e0e0e0;
      --glass: rgba(255, 255, 255, 0.03);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: var(--bg-dark); 
      color: var(--text); 
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      overflow-x: hidden;
      background: radial-gradient(circle at top right, #1a1b3a, #0a0b1e);
      min-height: 100vh;
    }

    /* Header */
    header {
      padding: 20px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: 2px; }
    .user-stats { display: flex; gap: 20px; align-items: center; }
    .balance-box { 
      background: var(--glass); padding: 8px 15px; border-radius: 20px; 
      border: 1px solid rgba(255,255,255,0.1); font-weight: 600;
    }
    .login-btn { 
      padding: 8px 20px; border-radius: 20px; background: var(--accent); 
      color: #000; border: none; font-weight: 700; cursor: pointer; transition: 0.3s;
    }
    .login-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

    /* Main Container */
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }

    /* Market List */
    .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
    .section-title::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }

    .market-grid { display: grid; gap: 15px; }
    .stock-card {
      background: var(--card-bg); border-radius: 15px; padding: 20px;
      display: flex; justify-content: space-between; align-items: center;
      border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
      backdrop-filter: blur(5px);
    }
    .stock-card:hover { transform: translateX(10px); background: rgba(255,255,255,0.08); border-color: var(--accent); }

    .stock-info { display: flex; align-items: center; gap: 15px; }
    .stock-icon { 
      width: 45px; height: 45px; background: var(--glass); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    }
    .stock-name { font-weight: 700; font-size: 1.1rem; }
    .stock-code { font-size: 0.8rem; opacity: 0.5; margin-top: 2px; }

    .stock-price-area { text-align: right; }
    .price { font-size: 1.1rem; font-weight: 700; }
    .change { font-size: 0.85rem; margin-top: 4px; }
    .change.up { color: var(--up); }
    .change.down { color: var(--down); }

    /* Sidebar / Ranking */
    .sidebar { display: flex; flex-direction: column; gap: 30px; }
    .ranking-box { 
      background: var(--card-bg); border-radius: 20px; padding: 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .rank-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .rank-item:last-child { border: none; }
    .rank-nick { font-weight: 500; }
    .rank-val { color: var(--accent); font-weight: 700; }

    /* Login Modal */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
      display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-content {
      background: #15162c; padding: 40px; border-radius: 30px; width: 400px;
      border: 1px solid rgba(255,255,255,0.1); text-align: center;
    }
    .modal h2 { margin-bottom: 25px; color: var(--accent); }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; font-size: 0.8rem; margin-bottom: 8px; opacity: 0.7; }
    .input-group input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 15px; border-radius: 12px; color: #fff; font-size: 1rem;
    }
    .modal-btn {
      width: 100%; padding: 15px; border-radius: 15px; background: var(--accent);
      color: #000; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer;
    }

    /* Animation */
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
    .loading-dot { display: inline-block; animation: pulse 1s infinite; }

    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="location.href='../index.html'" style="cursor:pointer">G-CASTLE STOCK</div>
  <div class="user-stats">
    <div class="balance-box" id="userNick">로그인 해주세요</div>
    <div class="balance-box" id="userBalance">₩ 0</div>
    <button class="login-btn" id="btnLogin">LOGIN</button>
  </div>
</header>

<div class="container">
  <!-- 마켓 리스트 -->
  <div class="market-section">
    <div class="section-title">REAL-TIME MARKET</div>
    <div class="market-grid" id="marketGrid">
      <div style="padding: 40px; text-align: center; opacity: 0.5;">
        시장을 불러오는 중입니다<span class="loading-dot">...</span>
      </div>
    </div>
  </div>

  <!-- 사이드바 (포트폴리오 & 랭킹) -->
  <div class="sidebar">
    <!-- 내 포트폴리오 -->
    <div class="ranking-box" id="portfolioBox" style="display: none; margin-bottom: 20px; border-color: var(--accent);">
      <div class="section-title">MY PORTFOLIO</div>
      <div id="portfolioList">
        <div style="padding: 10px; text-align: center; opacity: 0.5;">보유 자산이 없습니다.</div>
      </div>
    </div>

    <!-- 랭킹 -->
    <div class="ranking-box">
      <div class="section-title">TOP RANKERS</div>
      <div id="rankingList">
        <div style="padding: 20px; text-align: center; opacity: 0.5;">집계 중...</div>
      </div>
    </div>
  </div>
</div>

<!-- 로그인 모달 -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h2 id="modalTitle">EXCHANGE LOGIN</h2>
    <div class="input-group">
      <label>ID (아이디)</label>
      <input type="text" id="inputId" placeholder="아이디를 입력하세요">
    </div>
    <div class="input-group">
      <label>PASSWORD (비밀번호)</label>
      <input type="password" id="inputPw" placeholder="비밀번호를 입력하세요">
    </div>
    <div class="input-group" id="nickGroup" style="display: none;">
      <label>NICKNAME (닉네임 - 첫 가입시에만 필요)</label>
      <input type="text" id="inputNick" placeholder="사용할 닉네임을 입력하세요">
    </div>
    <button class="modal-btn" id="btnConfirm">확인</button>
    <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.5;">처음 오셨나요? 아이디/비번을 입력하면 자동 가입됩니다.</p>
  </div>
</div>

<script src="../common/config.js"></script>
<script src="stock_script.js"></script>
</body>
</html>
