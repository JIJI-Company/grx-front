<!--
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>꾸한성 주식 거래소 | G-CASTLE EXCHANGE</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --accent: #c8ff00;
      --accent-dim: rgba(200,255,0,0.15);
      --accent-glow: rgba(200,255,0,0.3);
      --up: #00e676;
      --up-dim: rgba(0,230,118,0.12);
      --down: #ff3d57;
      --down-dim: rgba(255,61,87,0.12);
      --text: #f0f0f0;
      --text-muted: #6b6b6b;
      --text-dim: #9a9a9a;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 배경 노이즈/그리드 텍스처 ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(200,255,0,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0 5%;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo-area {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
    }
    .logo-badge {
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 1.5px;
    }
    .logo-text {
      font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; color: var(--text);
    }

    .header-right {
      display: flex; align-items: center; gap: 12px;
    }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 8px 14px; border-radius: 30px;
      font-size: 0.9rem; font-weight: 500;
    }
    .user-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted);
    }
    .user-dot.online { background: var(--up); box-shadow: 0 0 8px var(--up); animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .balance-chip {
      background: var(--accent-dim);
      border: 1px solid rgba(200,255,0,0.2);
      color: var(--accent);
      padding: 8px 14px; border-radius: 30px;
      font-size: 0.95rem; font-weight: 700; letter-spacing: 0.5px;
    }

    .btn-login {
      background: var(--accent);
      color: #000;
      border: none; border-radius: 30px;
      padding: 9px 22px;
      font-weight: 700; font-size: 0.9rem;
      letter-spacing: 1px; cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-login:hover { transform: scale(1.04); box-shadow: 0 0 20px var(--accent-glow); }

    /* ── TICKER BAR ── */
    .ticker-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 5%;
      height: 38px;
      display: flex; align-items: center; gap: 30px;
      overflow: hidden; position: relative; z-index: 1;
    }
    .ticker-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; white-space: nowrap; letter-spacing: 0.5px;
    }
    .ticker-code { font-weight: 700; color: var(--text-dim); }
    .ticker-val { font-weight: 600; }
    .ticker-chg.up { color: var(--up); }
    .ticker-chg.down { color: var(--down); }

    /* ── MAIN LAYOUT ── */
    .page-wrap {
      position: relative; z-index: 1;
      max-width: 1280px; margin: 0 auto;
      padding: 40px 20px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
    }

    /* ── SECTION HEADER ── */
    .section-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 2px;
      color: var(--text-muted); text-transform: uppercase; margin-bottom: 16px;
    }

    /* ── MARKET CARDS ── */
    .market-grid { display: flex; flex-direction: column; gap: 10px; }

    .stock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      cursor: default;
    }
    .stock-card:hover {
      background: var(--surface2);
      border-color: var(--border-hover);
      transform: translateX(4px);
    }

    .stock-left { display: flex; align-items: center; gap: 14px; }
    .stock-avatar {
      width: 44px; height: 44px;
      background: var(--surface2);
      border-radius: 12px;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800;
      color: var(--accent);
    }
    .stock-name { font-size: 1rem; font-weight: 700; }
    .stock-code-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; letter-spacing: 1px; }

    .stock-middle { flex: 1; padding: 0 20px; }
    /* mini sparkline placeholder */

    .stock-right { display: flex; align-items: center; gap: 20px; }

    .price-block { text-align: right; }
    .price-val { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }
    .price-chg {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.78rem; font-weight: 700;
      padding: 3px 8px; border-radius: 6px; margin-top: 4px;
    }
    .price-chg.up { background: var(--up-dim); color: var(--up); }
    .price-chg.down { background: var(--down-dim); color: var(--down); }

    .trade-block {
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    }
    .qty-row { display: flex; align-items: center; gap: 6px; }
    .qty-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; }
    .qty-inp {
      width: 60px; text-align: center;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      padding: 6px 8px; font-family: inherit;
      font-size: 0.95rem; font-weight: 700;
      transition: border-color 0.2s;
    }
    .qty-inp:focus { outline: none; border-color: rgba(200,255,0,0.5); }

    .trade-btns { display: flex; gap: 6px; }
    .btn-trade {
      padding: 7px 16px; border: none; border-radius: 8px;
      font-family: inherit; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s;
    }
    .btn-trade.buy {
      background: var(--up-dim); color: var(--up);
      border: 1px solid rgba(0,230,118,0.2);
    }
    .btn-trade.buy:hover { background: var(--up); color: #000; transform: translateY(-2px); }
    .btn-trade.sell {
      background: var(--down-dim); color: var(--down);
      border: 1px solid rgba(255,61,87,0.2);
    }
    .btn-trade.sell:hover { background: var(--down); color: #fff; transform: translateY(-2px); }

    /* 유틸리티 버튼 (MAX / ALL) */
    .btn-util {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
    }
    .btn-util:hover { border-color: var(--accent); color: var(--accent); }

    /* 가격 변동 애니메이션 */
    @keyframes flash-up {
      0% { background: var(--up-dim); color: var(--up); }
      100% { background: transparent; color: inherit; }
    }
    @keyframes flash-down {
      0% { background: var(--down-dim); color: var(--down); }
      100% { background: transparent; color: inherit; }
    }
    .price-flash-up { animation: flash-up 1.5s ease-out forwards; }
    .price-flash-down { animation: flash-down 1.5s ease-out forwards; }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* Portfolio */
    .portfolio-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .total-val {
      font-size: 1.6rem; font-weight: 700; color: var(--accent); letter-spacing: 1px;
    }
    .total-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; letter-spacing: 1px; }

    .portfolio-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .portfolio-item:last-child { border: none; }
    .port-name { font-weight: 600; }
    .port-qty { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .port-val { font-weight: 700; color: var(--accent); text-align: right; }
    .port-avg { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }
    .port-pnl {
      display: inline-block;
      font-size: 0.72rem; font-weight: 700;
      padding: 2px 8px; border-radius: 6px; margin-top: 4px;
      letter-spacing: 0.3px;
    }

    /* ── NEWS PANEL ── */
    .news-list { display: flex; flex-direction: column; gap: 10px; }
    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .news-card:hover { border-color: var(--border-hover); background: var(--surface2); }
    .news-card.hint-up  { border-left: 4px solid var(--up); }
    .news-card.hint-down { border-left: 4px solid var(--down); }
    .news-card.hint-neutral { border-left: 4px solid var(--text-muted); }
    .news-meta {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.65rem; color: var(--text-muted);
      margin-bottom: 6px;
    }
    .news-headline {
      font-size: 0.95rem; font-weight: 700;
      line-height: 1.4; color: var(--text);
      margin-bottom: 8px;
    }
    .news-live {
      background: var(--down); color: #fff;
      font-size: 0.6rem; font-weight: 800;
      padding: 1px 5px; border-radius: 3px;
      letter-spacing: 0.5px;
      animation: pulse-dot 1.5s infinite;
    }
    .news-live.n-true { background: var(--up); animation: none; }
    .news-live.n-fake { background: var(--text-muted); animation: none; }
    .news-actions { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .news-hint {
      font-size: 0.7rem; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
      background: var(--surface2);
    }
    .news-hint.up { color: var(--up); background: var(--up-dim); }
    .news-hint.down { color: var(--down); background: var(--down-dim); }
    .news-hint.unknown { color: var(--text-muted); }
    .news-countdown { font-size: 0.72rem; color: var(--text-muted); font-weight: 700; }
    .news-next-label {
      font-size: 0.68rem; color: var(--text-muted); text-align: center;
      padding: 4px 0 8px; letter-spacing: 0.5px;
    }
    .btn-factcheck {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--accent-dim); border: 1px solid rgba(200,255,0,0.25);
      color: var(--accent); font-size: 0.7rem; font-weight: 700;
      padding: 3px 10px; border-radius: 6px; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .btn-factcheck:hover { background: var(--accent); color: #000; }
    .btn-factcheck.revealed { background: var(--surface2); border-color: var(--border); color: var(--text-dim); }
    .news-card.is-revealed { opacity: 0.75; }

    /* 기사 모달 */
    .article-modal-box {
      background: var(--surface);
      border: 1px solid var(--border-hover);
      border-radius: 24px;
      width: 480px; max-width: 92vw; max-height: 80vh;
      overflow-y: auto; padding: 36px 32px;
      position: relative;
      animation: modal-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .article-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .article-badge {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 0.65rem; font-weight: 700;
      padding: 3px 8px; border-radius: 4px; letter-spacing: 1px;
    }
    .article-time { font-size: 0.65rem; color: var(--text-muted); }
    .article-stamp {
      display: inline-block;
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem; font-weight: 900;
      transform: rotate(-8deg); border: 4px solid currentColor;
      padding: 6px 20px; margin: 10px 0 25px;
      text-transform: uppercase; border-radius: 8px;
      letter-spacing: 1px;
    }
    .article-stamp.a-true { border-color: var(--up); color: var(--up); box-shadow: 0 0 15px var(--up-dim); }
    .article-stamp.a-fake { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px var(--accent-dim); }
    .article-headline { 
      font-size: 1.5rem; font-weight: 800; color: #fff; 
      line-height: 1.3; margin-bottom: 20px; 
      letter-spacing: -0.5px;
    }
    .article-body { 
      font-size: 0.95rem; line-height: 1.8; color: #ccc;
      padding-left: 15px; border-left: 2px solid #333;
      margin-bottom: 20px;
    }
    .article-price { font-size: 0.8rem; color: var(--text-muted); padding: 10px; background: #222; border-radius: 8px; }
    .news-result {
      font-size: 0.68rem; font-weight: 700;
      padding: 2px 7px; border-radius: 4px; margin-top: 6px; margin-left: 4px;
      display: inline-block;
    }
    .news-result.true  { background: var(--up-dim); color: var(--up); }
    .news-result.false { background: rgba(200,255,0,0.1); color: var(--accent); }

    /* Ranking */
    .rank-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .rank-row:last-child { border: none; }
    .rank-num {
      width: 28px; height: 28px;
      background: var(--surface2); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 800; color: var(--text-muted);
      flex-shrink: 0;
    }
    .rank-num.gold { background: rgba(255,196,0,0.15); color: #ffc400; }
    .rank-num.silver { background: rgba(200,200,200,0.1); color: #c0c0c0; }
    .rank-num.bronze { background: rgba(200,120,60,0.12); color: #c87c3c; }
    .rank-info { flex: 1; }
    .rank-nick { font-weight: 600; font-size: 0.95rem; }
    .rank-val { font-weight: 700; color: var(--accent); font-size: 0.9rem; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none; justify-content: center; align-items: center;
      z-index: 999;
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border-hover);
      border-radius: 24px;
      width: 420px; max-width: 90vw;
      padding: 44px 40px;
      position: relative;
      animation: modal-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modal-in {
      from { opacity:0; transform: translateY(20px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    .modal-close {
      position: absolute; top: 18px; right: 18px;
      width: 32px; height: 32px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 50%; cursor: pointer; color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all 0.2s;
    }
    .modal-close:hover { background: var(--down-dim); color: var(--down); border-color: var(--down); }

    .modal-title {
      font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;
    }
    .modal-title span { color: var(--accent); }
    .modal-sub {
      font-size: 0.85rem; color: var(--text-muted); margin-bottom: 32px; line-height: 1.5;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 0.75rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      color: var(--text);
      font-family: inherit; font-size: 1rem; font-weight: 500;
      transition: all 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: rgba(200,255,0,0.4);
      box-shadow: 0 0 0 3px rgba(200,255,0,0.08);
    }
    .field-hint {
      margin-top: 6px; font-size: 0.75rem; color: var(--text-muted);
    }
    .field-hint span { color: var(--accent); }

    .btn-confirm {
      width: 100%; padding: 16px;
      background: var(--accent); color: #000;
      border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 1rem; font-weight: 800;
      letter-spacing: 1px; cursor: pointer;
      transition: all 0.2s; margin-top: 8px;
    }
    .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .modal-footer {
      text-align: center; margin-top: 20px;
      font-size: 0.8rem; color: var(--text-muted); line-height: 1.6;
    }

    /* ── LOADING / EMPTY STATES ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px; height: 68px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .empty-state {
      padding: 30px; text-align: center;
      font-size: 0.85rem; color: var(--text-muted); line-height: 2;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

    /* ── TOAST ── */
    #toastContainer {
      position: fixed; bottom: 28px; right: 28px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 9999; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border-hover);
      border-radius: 14px;
      padding: 14px 18px;
      min-width: 240px; max-width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      pointer-events: auto;
      animation: toast-in 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .toast.hide { animation: toast-out 0.3s ease forwards; }
    @keyframes toast-in {
      from { opacity:0; transform: translateY(16px) scale(0.95); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    @keyframes toast-out {
      from { opacity:1; transform: translateY(0) scale(1); }
      to   { opacity:0; transform: translateY(8px) scale(0.95); }
    }
    .toast-icon { font-size: 1.2rem; flex-shrink: 0; }
    .toast-body { flex: 1; }
    .toast-title { font-size: 0.9rem; font-weight: 700; }
    .toast-msg { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
    .toast.success { border-color: rgba(0,230,118,0.3); }
    .toast.success .toast-title { color: var(--up); }
    .toast.error { border-color: rgba(255,61,87,0.3); }
    .toast.error .toast-title { color: var(--down); }
    .toast.info { border-color: rgba(200,255,0,0.25); }
    .toast.info .toast-title { color: var(--accent); }

    /* ── TOTAL ASSET CHIP ── */
    .total-asset-chip {
      background: rgba(200,255,0,0.08);
      border: 1px solid rgba(200,255,0,0.2);
      border-radius: 30px; padding: 8px 14px;
      font-size: 0.75rem; font-weight: 700;
      color: var(--text-dim); white-space: nowrap;
    }
    .total-asset-chip span { color: var(--accent); font-size: 0.95rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .page-wrap { grid-template-columns: 1fr; }
